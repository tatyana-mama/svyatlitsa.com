<!DOCTYPE html><html lang="be"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>svyatlitsa — адміністратар</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#7EB8D4;--blue-dark:#5A9BB8;--blue-light:#B8D8E8;--blue-ice:#E8F4FA;
  --bg:#F8FBFD;--warm:#F0F6FA;--white:#FFFFFF;
  --navy:#1a2a3a;--text:#2B3437;--muted:#7A8B99;--border:#D8E8F0;
  --green:#3a9d5c;--green-bg:rgba(58,157,92,.08);
  --red:#c0392b;--red-bg:rgba(192,57,43,.08);
  --orange:#e67e22;--orange-bg:rgba(230,126,34,.08);
  --yellow:#d4a44a;--yellow-bg:rgba(212,164,74,.08);
  --font-display:'EB Garamond',Georgia,serif;
  --font-body:'Inter',-apple-system,sans-serif;
  --font-label:'Space Grotesk',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --shadow:0 1px 3px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.04);
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-weight:300;line-height:1.6}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{width:100%;max-width:400px;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:48px 36px;box-shadow:var(--shadow-md)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.login-logo img{width:32px;height:32px}
.login-logo-text{font-family:var(--font-display);font-size:24px;letter-spacing:3px;color:var(--navy)}
.login-sub{font-family:var(--font-label);font-size:9px;letter-spacing:4px;color:var(--orange);text-transform:uppercase;text-align:center;margin-bottom:36px}
.login-field{margin-bottom:20px}
.login-label{display:block;font-family:var(--font-label);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.login-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:var(--font-body);font-size:14px;color:var(--text);outline:none;transition:border-color .2s;font-weight:300}
.login-input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:14px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-family:var(--font-label);font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px}
.login-btn:hover{background:#2a3a4a}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{font-size:11px;color:var(--red);text-align:center;margin-top:16px;min-height:20px}
.login-back{display:block;text-align:center;margin-top:24px;font-size:11px;color:var(--muted);text-decoration:none}
.login-back:hover{color:var(--blue)}

/* APP */
.app{display:none;min-height:100vh}
.adm-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 24px;background:rgba(26,42,58,.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.adm-nav-left{display:flex;align-items:center;gap:12px}
.adm-nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.adm-nav-logo img{width:24px;height:24px;filter:brightness(2)}
.adm-nav-logo span{font-family:var(--font-display);font-size:16px;letter-spacing:3px;color:#fff;text-transform:lowercase}
.adm-nav-badge{font-family:var(--font-label);font-size:8px;letter-spacing:2px;color:var(--orange);text-transform:uppercase;padding:3px 8px;border:1px solid rgba(230,126,34,.3);border-radius:4px}
.adm-nav-right{display:flex;align-items:center;gap:12px}
.adm-nav-user{font-size:11px;color:rgba(255,255,255,.5)}
.adm-nav-btn{padding:6px 14px;border-radius:6px;font-family:var(--font-label);font-size:9px;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.adm-nav-btn:hover{border-color:rgba(255,255,255,.3);color:#fff}

/* BODY */
.adm-body{padding:72px 32px 32px;max-width:1100px;margin:0 auto}
.adm-title{font-family:var(--font-display);font-size:28px;font-weight:400;color:var(--navy);margin-bottom:4px}
.adm-sub{font-size:12px;color:var(--muted);margin-bottom:24px}

/* TABS */
.adm-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px}
.adm-tab{padding:10px 20px;font-family:var(--font-label);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.adm-tab:hover{color:var(--text)}
.adm-tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:500}
.adm-tab .count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:9px;font-weight:600;margin-left:6px;padding:0 5px}
.count-pending{background:var(--orange-bg);color:var(--orange)}
.count-all{background:var(--blue-ice);color:var(--blue-dark)}

/* TABLE */
.adm-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.adm-table{width:100%;border-collapse:collapse}
.adm-table th{font-family:var(--font-label);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:left;padding:14px 16px;border-bottom:2px solid var(--border);font-weight:500;background:var(--warm)}
.adm-table td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px}
.adm-table tr:last-child td{border-bottom:none}
.adm-table tr:hover td{background:var(--warm)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500}
.badge-pending{background:var(--orange-bg);color:var(--orange)}
.badge-confirmed{background:var(--green-bg);color:var(--green)}
.badge-completed{background:var(--blue-ice);color:var(--blue-dark)}
.badge-cancelled{background:var(--red-bg);color:var(--red)}
.adm-actions{display:flex;gap:6px}
.adm-act{padding:5px 12px;border-radius:6px;font-family:var(--font-label);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--muted);transition:all .15s}
.adm-act:hover{background:var(--warm)}
.adm-act.confirm{border-color:var(--green);color:var(--green)}
.adm-act.confirm:hover{background:var(--green-bg)}
.adm-act.cancel{border-color:var(--red);color:var(--red)}
.adm-act.cancel:hover{background:var(--red-bg)}
.adm-act.assign{border-color:var(--blue);color:var(--blue-dark)}
.adm-act.assign:hover{background:var(--blue-ice)}

/* DOCTOR SELECT */
.adm-select{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-family:var(--font-body);font-size:11px;background:var(--white);color:var(--text);outline:none}

/* STATS */
.adm-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.adm-stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow)}
.adm-stat-label{font-size:10px;color:var(--muted)}
.adm-stat-num{font-family:var(--font-display);font-size:28px;color:var(--navy)}

/* EMPTY */
.adm-empty{text-align:center;padding:48px;color:var(--muted);font-size:13px}
.adm-toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.adm-toast.show{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:768px){
  .adm-body{padding:60px 16px 16px}
  .adm-nav{padding:0 16px}
  .adm-nav-user{display:none}
  .adm-table th,.adm-table td{padding:10px 8px;font-size:11px}
  .adm-actions{flex-direction:column}
  .adm-stats{grid-template-columns:1fr 1fr}
}
</style>
<style id="labs67-lang-css"></style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo"><img src="/logo.svg" alt=""><span class="login-logo-text">svyatlitsa</span></div>
    <div class="login-sub">адміністратар</div>
    <div class="login-field">
      <label class="login-label">Email</label>
      <input class="login-input" type="email" id="loginEmail">
    </div>
    <div class="login-field">
      <label class="login-label">Пароль</label>
      <input class="login-input" type="password" id="loginPassword">
    </div>
    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Увайсці</button>
    <div class="login-error" id="loginError"></div>
    <a href="/" class="login-back">&larr; svyatlitsa.com</a>
  </div>
</div>

<!-- APP -->
<div class="app" id="appWrap">
  <nav class="adm-nav">
    <div class="adm-nav-left">
      <a class="adm-nav-logo" href="/"><img src="/logo.svg" alt=""><span>svyatlitsa</span></a>
      <span class="adm-nav-badge">admin</span>
    </div>
    <div class="adm-nav-right">
      <span class="adm-nav-user" id="navUser"></span>
      <button class="adm-nav-btn" onclick="handleLogout()">Выйсці</button>
    </div>
  </nav>

  <div class="adm-body">
    <div class="adm-title">Кіраванне запісамі</div>
    <div class="adm-sub" id="admDate"></div>

    <div class="adm-stats">
      <div class="adm-stat"><div class="adm-stat-label">Чакаюць</div><div class="adm-stat-num" id="sPending">0</div></div>
      <div class="adm-stat"><div class="adm-stat-label">Пацверджаны</div><div class="adm-stat-num" id="sConfirmed">0</div></div>
      <div class="adm-stat"><div class="adm-stat-label">Сёння</div><div class="adm-stat-num" id="sToday">0</div></div>
      <div class="adm-stat"><div class="adm-stat-label">Пацыентаў</div><div class="adm-stat-num" id="sPatients">0</div></div>
    </div>

    <div class="adm-tabs">
      <button class="adm-tab active" onclick="showTab('pending')">Чакаюць <span class="count count-pending" id="tabPendingCount">0</span></button>
      <button class="adm-tab" onclick="showTab('all')">Усе <span class="count count-all" id="tabAllCount">0</span></button>
      <button class="adm-tab" onclick="showTab('patients')">Пацыенты</button>
      <button class="adm-tab" onclick="showTab('doctors')">Лекары</button>
    </div>

    <div class="adm-card">
      <!-- PENDING -->
      <div id="tab-pending">
        <table class="adm-table" id="pendingTable">
          <thead><tr><th>Пацыент</th><th>Паслуга</th><th>Дата</th><th>Час</th><th>Лекар</th><th>Дзеянні</th></tr></thead>
          <tbody id="pendingBody"></tbody>
        </table>
      </div>
      <!-- ALL -->
      <div id="tab-all" style="display:none">
        <table class="adm-table">
          <thead><tr><th>Пацыент</th><th>Паслуга</th><th>Дата</th><th>Час</th><th>Лекар</th><th>Статус</th><th>Дзеянні</th></tr></thead>
          <tbody id="allBody"></tbody>
        </table>
      </div>
      <!-- PATIENTS -->
      <div id="tab-patients" style="display:none">
        <table class="adm-table">
          <thead><tr><th>Імя</th><th>Email</th><th>Тэлефон</th><th>Запісаў</th><th>Рэгістрацыя</th></tr></thead>
          <tbody id="patientsBody"></tbody>
        </table>
      </div>
      <!-- DOCTORS -->
      <div id="tab-doctors" style="display:none">
        <table class="adm-table">
          <thead><tr><th>Імя</th><th>Спецыялізацыя</th><th>Email</th><th>Статус</th></tr></thead>
          <tbody id="doctorsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="adm-toast" id="admToast"></div>

<script>
var SUPA_URL = 'https://rkjvqwiwdednvorhhozb.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJranZxd2l3ZGVkbnZvcmhob3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODIwOTUsImV4cCI6MjA5MTA1ODA5NX0.BhgxhJR7dtITrMBTS-V1h3eplH2KmWfIDxQYldfb3kE';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);
var me = null;
var doctors = [];

document.getElementById('admDate').textContent = new Date().toLocaleDateString('be-BY', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

async function handleLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pw = document.getElementById('loginPassword').value;
  var err = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');
  if (!email || !pw) { err.textContent = 'Запоўніце ўсе палі'; return; }
  btn.disabled = true; err.textContent = '';
  var r = await sb.auth.signInWithPassword({ email: email, password: pw });
  if (r.error) { err.textContent = r.error.message; btn.disabled = false; return; }
  var s = await sb.from('staff').select('*').eq('user_id', r.data.user.id).eq('role', 'admin').single();
  if (!s.data) { err.textContent = 'Няма правоў адміністратара'; await sb.auth.signOut(); btn.disabled = false; return; }
  me = s.data;
  showApp();
}

async function handleLogout() { await sb.auth.signOut(); me = null; location.reload(); }

async function checkSession() {
  var s = await sb.auth.getSession();
  if (!s.data.session) return;
  var r = await sb.from('staff').select('*').eq('user_id', s.data.session.user.id).eq('role', 'admin').single();
  if (r.data) { me = r.data; showApp(); }
}

async function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'block';
  document.getElementById('navUser').textContent = me.name;
  await loadDoctors();
  await loadAll();
}

async function loadDoctors() {
  var r = await sb.from('staff').select('*').eq('role', 'doctor').eq('active', true);
  doctors = r.data || [];
}

function doctorSelect(apptId, currentDoctorId) {
  var html = '<select class="adm-select" onchange="assignDoctor(\'' + apptId + '\',this.value)"><option value="">—</option>';
  doctors.forEach(function(d) {
    html += '<option value="' + d.id + '"' + (d.id === currentDoctorId ? ' selected' : '') + '>' + d.name + '</option>';
  });
  return html + '</select>';
}

async function loadAll() {
  var today = new Date().toISOString().split('T')[0];

  // All appointments with patient info
  var r = await sb.from('patient_appointments').select('*, patients(name, email, phone)').order('date', { ascending: false });
  var items = r.data || [];

  // Stats
  var pending = items.filter(function(a) { return a.status === 'pending'; });
  var confirmed = items.filter(function(a) { return a.status === 'confirmed'; });
  var todayItems = items.filter(function(a) { return a.date === today; });
  document.getElementById('sPending').textContent = pending.length;
  document.getElementById('sConfirmed').textContent = confirmed.length;
  document.getElementById('sToday').textContent = todayItems.length;
  document.getElementById('tabPendingCount').textContent = pending.length;
  document.getElementById('tabAllCount').textContent = items.length;

  // Patients count
  var pc = await sb.from('patients').select('id', { count: 'exact', head: true });
  document.getElementById('sPatients').textContent = pc.count || 0;

  // Pending table
  var pb = document.getElementById('pendingBody');
  if (!pending.length) { pb.innerHTML = '<tr><td colspan="6" class="adm-empty">Няма запісаў у чаканні</td></tr>'; }
  else { pb.innerHTML = pending.map(function(a) { return apptRow(a, false); }).join(''); }

  // All table
  var ab = document.getElementById('allBody');
  if (!items.length) { ab.innerHTML = '<tr><td colspan="7" class="adm-empty">Няма запісаў</td></tr>'; }
  else { ab.innerHTML = items.map(function(a) { return apptRow(a, true); }).join(''); }

  // Patients
  var pr = await sb.from('patients').select('*, patient_appointments(id)').order('created_at', { ascending: false });
  var pts = pr.data || [];
  var ptb = document.getElementById('patientsBody');
  if (!pts.length) { ptb.innerHTML = '<tr><td colspan="5" class="adm-empty">Няма пацыентаў</td></tr>'; }
  else { ptb.innerHTML = pts.map(function(p) {
    return '<tr><td>' + p.name + '</td><td>' + (p.email||'—') + '</td><td>' + (p.phone||'—') + '</td><td>' + (p.patient_appointments?p.patient_appointments.length:0) + '</td><td>' + p.created_at.split('T')[0] + '</td></tr>';
  }).join(''); }

  // Doctors
  var dr = await sb.from('staff').select('*').eq('role', 'doctor');
  var drs = dr.data || [];
  var db = document.getElementById('doctorsBody');
  if (!drs.length) { db.innerHTML = '<tr><td colspan="4" class="adm-empty">Няма лекараў</td></tr>'; }
  else { db.innerHTML = drs.map(function(d) {
    return '<tr><td>' + d.name + '</td><td>' + (d.specialization||'—') + '</td><td>' + (d.email||'—') + '</td><td>' + (d.active ? '<span class="badge badge-confirmed">Актыўны</span>' : '<span class="badge badge-cancelled">Неактыўны</span>') + '</td></tr>';
  }).join(''); }
}

function apptRow(a, showStatus) {
  var name = a.patients ? a.patients.name : '—';
  var actions = '';
  if (a.status === 'pending') {
    actions = '<div class="adm-actions"><button class="adm-act confirm" onclick="setStatus(\'' + a.id + '\',\'confirmed\')">&#10003;</button><button class="adm-act cancel" onclick="setStatus(\'' + a.id + '\',\'cancelled\')">&#10007;</button></div>';
  } else if (a.status === 'confirmed') {
    actions = '<div class="adm-actions"><button class="adm-act" onclick="setStatus(\'' + a.id + '\',\'completed\')">Завяршыць</button><button class="adm-act cancel" onclick="setStatus(\'' + a.id + '\',\'cancelled\')">&#10007;</button></div>';
  }
  var statusCol = showStatus ? '<td><span class="badge badge-' + a.status + '">' + a.status + '</span></td>' : '';
  return '<tr><td>' + name + '</td><td>' + a.service + '</td><td>' + a.date + '</td><td>' + (a.time||'—') + '</td><td>' + doctorSelect(a.id, a.doctor_id) + '</td>' + statusCol + '<td>' + actions + '</td></tr>';
}

async function setStatus(id, status) {
  await sb.from('patient_appointments').update({ status: status }).eq('id', id);
  toast(status === 'confirmed' ? 'Пацверджана' : status === 'cancelled' ? 'Адменена' : 'Завершана');
  loadAll();
}

async function assignDoctor(apptId, doctorId) {
  await sb.from('patient_appointments').update({ doctor_id: doctorId || null }).eq('id', apptId);
  toast('Лекар прызначаны');
}

function showTab(name) {
  ['pending','all','patients','doctors'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.adm-tab').forEach(function(b, i) {
    b.classList.toggle('active', ['pending','all','patients','doctors'][i] === name);
  });
}

function toast(msg) {
  var el = document.getElementById('admToast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

checkSession();
</script>
</body></html>
